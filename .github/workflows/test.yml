name: Tests

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run algorithm tests
        run: python3 tests/test_algorithms.py -v

      - name: Auto-approve and merge PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve -b "Tests passed — auto-approving."
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
